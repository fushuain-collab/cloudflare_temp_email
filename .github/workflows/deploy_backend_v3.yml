name: Deploy Backend v3
on:
  workflow_dispatch:
  push:
    tags:
      - "*"
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy Backend Worker
        run: |
          cd worker
          wrangler d1 create temp_email_db 2>&1 || true
          wrangler d1 list --json > /tmp/d1_list.json
          DB_UUID=$(python3 -c "import json,sys;d=json.load(open(sys.argv[1]));[print(x["uuid"]) for x in d if x["name"]=="temp_email_db"]" /tmp/d1_list.json 2>/dev/null)
          if [ -z "$DB_UUID" ]; then echo "FAIL: cannot get uuid"; exit 1; fi
          echo "DB_UUID=$DB_UUID"
          echo "$WRANGLER_TOML_CONTENT" > wrangler.toml
          python3 -c "import sys,re;c=open("wrangler.toml").read();c=re.sub(r"database_id\s*=\s*\"[^"]*\"","database_id = \""+sys.argv[1]+"\"",c);open("wrangler.toml","w").write(c)" "$DB_UUID"
          grep database_id wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
