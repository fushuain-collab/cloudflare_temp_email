name: Deploy Backend v3
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - name: Deploy Backend
        run: |
          cd worker
          wrangler d1 create temp_email_db 2>&1 || true
          echo "$WRANGLER_TOML_CONTENT" > /tmp/base.toml
          DB_UUID=$(wrangler d1 list --json 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);[print(x.get('uuid','')) for x in d if x.get('name','')=='temp_email_db']" 2>/dev/null || echo "d15a8696-757c-49f1-a176-248bf781bf98")
          echo "Using DB_UUID=$DB_UUID"
          sed "s/database_id *= *"[^"]*"/database_id = "$DB_UUID"/" /tmp/base.toml > wrangler.toml
          cat wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
