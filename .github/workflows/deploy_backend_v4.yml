name: Deploy Backend v4
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        with:
          version: 10
          run_install: false
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy Backend
        run: |
          cd worker
          wrangler d1 create temp_email_db 2>&1 || true
          echo "$WRANGLER_TOML_CONTENT" > /tmp/base.toml
          DB_UUID=$(wrangler d1 list --json 2>/dev/null | python3 -c "import json,sys;d=json.load(sys.stdin);[print(x.get(chr(117)+chr(117)+chr(105)+chr(100),chr(0))) for x in d if x.get(chr(110)+chr(97)+chr(109)+chr(101),chr(0))==chr(116)+chr(101)+chr(109)+chr(112)+chr(95)+chr(101)+chr(109)+chr(97)+chr(105)+chr(108)+chr(95)+chr(100)+chr(98)]" 2>/dev/null || echo d15a8696-757c-49f1-a176-248bf781bf98)
          echo Using UUID=$DB_UUID
          python3 -c "import sys,re;c=open(chr(47)+chr(116)+chr(109)+chr(112)+chr(47)+chr(98)+chr(97)+chr(115)+chr(101)+chr(46)+chr(116)+chr(111)+chr(109)+chr(108)).read();c=re.sub(chr(100)+chr(97)+chr(116)+chr(97)+chr(98)+chr(97)+chr(115)+chr(101)+chr(95)+chr(105)+chr(100)+chr(32)+chr(42)+chr(61)+chr(32)+chr(42)+chr(34)+chr(91)+chr(94)+chr(34)+chr(93)+chr(42)+chr(34),chr(100)+chr(97)+chr(116)+chr(97)+chr(98)+chr(97)+chr(115)+chr(101)+chr(95)+chr(105)+chr(100)+chr(32)+chr(61)+chr(32)+chr(34)+sys.argv[1]+chr(34),c);open(chr(119)+chr(114)+chr(97)+chr(110)+chr(103)+chr(108)+chr(101)+chr(114)+chr(46)+chr(116)+chr(111)+chr(109)+chr(108),chr(119)).write(c)" $DB_UUID
          grep database_id wrangler.toml
          pnpm install --no-frozen-lockfile
          pnpm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
