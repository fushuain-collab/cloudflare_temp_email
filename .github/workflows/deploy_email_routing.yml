name: Deploy Email Routing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/deploy_email_routing.sh'\
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Deploy Email Routing & Config
        run: |
          chmod +x scripts/deploy_email_routing.sh
          ./scripts/deploy_email_routing.sh
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
