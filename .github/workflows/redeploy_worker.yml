name: Redeploy Worker

oo:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/redeploy_worker.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Deploy Worker
        run: |
          chmod +x scripts/redeploy_worker.sh
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }} ./scripts/redeploy_worker.sh
