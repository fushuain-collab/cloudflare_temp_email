name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          
          cd worker/
          # 自动创建D1数据库（如果不存在）
          echo "Checking/Creating D1 database temp_email_db..."
          DB_INFO=$(npx wrangler d1 create temp_email_db 2>&1 || true)
          echo "$DB_INFO"
          # 从输出中提取database_id(UUID)
          DB_UUID=$(echo "$DB_INFO" | grep -oP '"database_id":\s*"\K[a-f0-9-]+' || echo "")
          if [ -z "$DB_UUID" ]; then
            # 尝试用list方式获取已存在的db uuid
            DB_UUID=$(npx wrangler d1 list --json 2>/dev/null | python3 -c "import sys,json; dbs=json.load(sys.stdin); [print(d['uuid']) for d in dbs if d['name']=='temp_email_db']" || echo "")
          fi
          if [ -z "$DB_UUID" ]; then
            echo "ERROR: Could not find or create D1 database temp_email_db"
            exit 1
          fi
          echo "Using D1 database UUID: $DB_UUID"
          # 替换wrangler.toml中的占位符
          # 先写入BACKEND_TOML内容
          printf '%s\n' "$WRANGLER_TOML_CONTENT" > wrangler.toml.orig
          # 替换 database_id 为真实UUID（兼容"xxx"或"temp_email_db"等占位符）
          python3 -c "
import re, sys
with open('wrangler.toml.orig', 'r') as f:
    content = f.read()
# 替换 database_id = "xxx" 或 database_id = "temp_email_db" 为真实UUID
content = re.sub(r'(database_id\s*=\s*)"[^"]+"', r'\1"$DB_UUID"', content)
with open('wrangler.toml', 'w') as f:
    f.write(content)
print('Updated wrangler.toml database_id')
" 
          
          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # ✅ 将 secret 映射到环境变量中
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
