name: Deploy Backend
on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false
      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          cd worker/
          echo "Creating D1 database temp_email_db (if not exists)..."
          npx wrangler d1 create temp_email_db 2>&1 || true
          echo "Getting D1 database UUID..."
          npx wrangler d1 list --json 2>/dev/null > /tmp/d1_list.json
          DB_UUID=$(python3 -c 'import json; dbs=json.load(open("/tmp/d1_list.json")); [print(d["uuid"]) for d in dbs if d["name"]=="temp_email_db"]' 2>/dev/null || echo "")
          if [ -z "$DB_UUID" ]; then
            echo "ERROR: Could not get UUID for D1 database temp_email_db"
            exit 1
          fi
          echo "Using D1 UUID: $DB_UUID"
          printf '%s\n' "$WRANGLER_TOML_CONTENT" | python3 -c "
import sys, re
content = sys.stdin.read()
uuid = '$DB_UUID'
content = re.sub(r'database_id\s*=\s*\"[^\"]*\"', 'database_id = \"' + uuid + '\"', content)
print(content, end='')
" > wrangler.toml
          echo "wrangler.toml ready, database_id=$DB_UUID"
          grep database_id wrangler.toml
          pnpm install --no-frozen-lockfile
          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi
          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
