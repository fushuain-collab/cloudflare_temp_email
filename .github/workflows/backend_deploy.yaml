name: Deploy Backend

on:
  workflow_run:
    workflows: [Upstream Sync]
    types: [completed]
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v5
        name: Install pnpm
        id: pnpm-install
        with:
          version: 10
          run_install: false

      - name: Deploy Backend for ${{ github.ref_name }}
        run: |
          export use_worker_assets=${{ secrets.USE_WORKER_ASSETS }}
          export use_worker_assets_with_telegram=${{ secrets.USE_WORKER_ASSETS_WITH_TELEGRAM }}
          
          if [ -n "$use_worker_assets" ]; then
            cd frontend/
            pnpm install --no-frozen-lockfile
            if [ -n "$use_worker_assets_with_telegram" ]; then
              echo "Building with telegram pages"
              pnpm build:telegram:pages
            else
              echo "Building with normal pages"
              pnpm build:pages
            fi
            cd ..
          fi

          export debug_mode=${{ secrets.DEBUG_MODE }}
          export use_mail_wasm_parser=${{ secrets.BACKEND_USE_MAIL_WASM_PARSER }}
          
          cd worker/
          # 自动创建D1数据库（如果不存在）
          echo "Checking/Creating D1 database temp_email_db..."
          # 尝试创建，如果已存在则忽略错误
          npx wrangler d1 create temp_email_db 2>&1 || true
          # 获取真实UUID - 用wrangler d1 list --json解析  
          echo "Getting D1 database UUID..."
          DB_UUID=$(npx wrangler d1 list --json 2>/dev/null | python3 -c 'import sys,json;dbs=json.load(sys.stdin);[print(d["uuid"]) for d in dbs if d["name"]=="temp_email_db"]' 2>/dev/null || echo "")
          if [ -z "$DB_UUID" ]; then
            echo "ERROR: Failed to get UUID for D1 database temp_email_db"
            exit 1
          fi
          echo "Using D1 database UUID: $DB_UUID"
          # 写入BACKEND_TOML并替换database_id为真实UUID
          # 使用python3完全在脚本内部替换，避免shell转义陷阱
          python3 -c '
import sys, json, os
content = "$WRANGLER_TOML_CONTENT"
uuid = os.environ.get("CF_D1_UUID", "")
import re
content = re.sub(r"database_id\s*=\s*"[^"]*"", "database_id = \"" + uuid + "\"", content)
with open("wrangler.toml", "w") as f:
    f.write(content)
print("Updated wrangler.toml database_id to: " + uuid)
' 2>&1
          echo "wrangler.toml prepared for deployment"
          # 验证uuid已写入
          grep database_id wrangler.toml
          
          pnpm install --no-frozen-lockfile

          if [ -n "$use_mail_wasm_parser" ]; then
            echo "Using mail-parser-wasm-worker"
            pnpm add mail-parser-wasm-worker
            git apply ../.github/config/mail-parser-wasm-worker.patch
            echo "Applied mail-parser-wasm-worker patch"
          fi

          if [ "$debug_mode" = "true" ]; then
            pnpm run deploy
          else
            if pnpm run deploy >/dev/null 2>&1; then
              echo "Deploy succeeded"
            else
              code=$?
              echo "Command failed with exit code $code"
              exit "$code"
            fi
          fi
          echo "Deployed for tag ${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # ✅ 将 secret 映射到环境变量中
          WRANGLER_TOML_CONTENT: ${{ secrets.BACKEND_TOML }}
          # ✅ 将D1 UUID通过环境变量传递给python脚本
          CF_D1_UUID: ${{ steps.d1-uuid.outputs.uuid }}
